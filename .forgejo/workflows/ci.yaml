on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_x86_64:
        description: "Build x86_64 outputs"
        type: boolean
        default: true
      build_aarch64:
        description: "Build aarch64 outputs"
        type: boolean
        default: true
jobs:
  build-x86_64:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_x86_64 }}
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Build and push x86_64 outputs
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: om ci run .#default.x86_64 | xargs cachix push cholli
  build-aarch64:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_aarch64 }}
    runs-on: aarch64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Build and push aarch64 outputs
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: om ci run .#default.aarch64 | xargs cachix push cholli
  promote:
    needs: [build-x86_64, build-aarch64]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}
      - name: Fast-forward main to last successful commit
        run: |
          git config user.email "forgejo-actions[bot]@christophhollizeck.dev"
          git config user.name "forgejo-actions[bot]"
          git checkout main
          git merge --ff-only ${{ github.sha }}
          git push origin main
